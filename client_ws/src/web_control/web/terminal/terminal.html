<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Logs | Robot Control</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        body { 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0 10px 10px 10px !important;
            box-sizing: border-box;
        }
        
        .container-terminal {
            width: 90%;
            max-width: 800px;
            margin: 10px auto; 
            padding: 20px;
            background-color: var(--bg-dark); 
            border-radius: 10px; 
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s ease;
            box-sizing: border-box;
        }
        
        .terminal-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 15px; 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 10px;
            transition: border-color 0.3s ease;
            flex-shrink: 0;
        }
        
        .terminal-header h1 { 
            color: var(--accent); 
            margin: 0; 
            transition: color 0.3s ease;
        }
        
        .terminal-window {
            background-color: #000;
            color: rgb(25, 197, 219);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0, 183, 255, 0.3);
            border: 2px solid #333;
        }
        
        body.dark-mode .terminal-window {
            background-color: #0a0f15;
            border-color: #1a2332;
        }
        
        .log-line {
            margin: 5px 0;
            padding: 4px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .log-line.info {
            color: rgb(25, 197, 219);
        }
        
        .log-line.warn {
            color: #f39c12;
        }
        
        .log-line.error {
            color: #e74c3c;
        }
        
        .log-line.success {
            color: #2ecc71;
        }
        
        .terminal-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .btn-terminal {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-clear {
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-clear:hover {
            background: linear-gradient(to bottom, #c0392b, #a93226);
        }
        
        .btn-pause {
            background: linear-gradient(to bottom, #f39c12, #e67e22);
            color: white;
        }
        
        .btn-pause:hover {
            background: linear-gradient(to bottom, #e67e22, #d35400);
        }
        
        .btn-pause.paused {
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
        }

        /* Responsive terminal */
        @media (max-width: 768px) {
            .container-terminal {
                width: 95%;
                padding: 12px;
                margin: 8px auto;
            }
            .terminal-header h1 {
                font-size: 1.2rem;
            }
            .terminal-window {
                font-size: 0.85rem;
                padding: 12px;
            }
            .terminal-controls {
                flex-wrap: wrap;
            }
        }
        @media (max-width: 500px) {
            body {
                padding: 0 5px 5px 5px !important;
            }
            .container-terminal {
                width: 100%;
                padding: 8px;
                margin: 5px auto;
                border-radius: 6px;
            }
            .terminal-header {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }
            .terminal-header h1 {
                font-size: 1rem;
            }
            .terminal-window {
                font-size: 0.8rem;
                padding: 10px;
            }
            .btn-terminal {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<script>
// Désactiver le défilement avec la molette sur body uniquement
document.body.addEventListener('wheel', (e) => {
    if (e.target === document.body || e.target === document.documentElement) {
        e.preventDefault();
    }
}, { passive: false });
</script>

    <header>
        <nav class="header-nav-left">
            <a href="../index.html" class="nav-btn">🕹️ Contrôle</a>
            <a href="../navig/navig.html" class="nav-btn">🗺️ Navigation</a>
            <a href="../galerie/gallery.html" class="nav-btn">📸 Galerie</a>
        </nav>
        <div class="header-center">
            <a href="../index.html">
                <img src="../logo-polytech.png" alt="Logo Polytech" class="logo">
            </a>
        </div>
        <div class="header-right">
            <button id="btnDarkMode" onclick="toggleDarkMode()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;" title="Mode sombre">🌙</button>
            <div id="status" class="disconnected" title="État de la connexion ROS">Déconnecté</div>
        </div>
    </header>

    <div class="container-terminal">
        <div class="terminal-header">
            <h1>📟 Logs Système</h1>
            <div style="color: var(--text);">
                <span id="logCount">0</span> lignes
            </div>
        </div>
        
        <div id="terminalWindow" class="terminal-window">
            <div class="log-line info">> Système initialisé</div>
            <div class="log-line info">> En attente de connexion ROS2...</div>
        </div>
        
        <div class="terminal-controls">
            <button class="btn-terminal btn-pause" id="btnPause" onclick="togglePause()">⏸️ Pause</button>
            <button class="btn-terminal btn-clear" onclick="clearLogs()">🗑️ Effacer</button>
        </div>
    </div>

    <script src="terminal.js"></script>
</body>
</html>
