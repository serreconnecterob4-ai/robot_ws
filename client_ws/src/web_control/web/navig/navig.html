<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation sur Carte</title>
    <link rel="stylesheet" href="navig.css">
</head>
<body>
<script>
// Désactiver le défilement avec la molette sur body uniquement
document.body.addEventListener('wheel', (e) => {
    if (e.target === document.body || e.target === document.documentElement) {
        e.preventDefault();
    }
}, { passive: false });
</script>
    <header class="nav-header">
        <nav>
            <a href="../index.html" class="nav-btn">🏠 Accueil</a>
            <a href="../galerie/gallery.html" class="nav-btn">📸 Galerie</a>
        </nav>
        <div class="logo-container">
            <a href="../index.html">
                <img src="../logo-polytech.png" alt="Logo Polytech" class="logo">
            </a>
        </div>
        <div class="header-right">
            <button id="header-settings-btn" onclick="toggleHeaderSettings()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; transition: transform 0.5s ease;" title="Paramètres">⚙️</button>
            <button id="dark-mode-toggle" style="background:none; border:none; font-size:1.5rem; cursor:pointer;" title="Mode sombre">🌙</button>
        </div>
    </header>
    
    <!-- Modal des paramètres du header -->
    <div id="header-settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleHeaderSettings()">&times;</span>
            <h2>⚙️ Paramètres avancés</h2>
            <div class="setting-row">
                <label for="header-font-size-slider">Taille de police:</label>
                <input type="range" id="header-font-size-slider" min="1" max="3" value="2" step="1">
                <span id="header-font-size-label">Moyen</span>
            </div>
        </div>
    </div>
    
    <div id="container">
        <div id="map-container">
            <div class="zoom-controls">
                <button id="zoom-in">+</button>
                <button id="zoom-out">-</button>
            </div>
            <div id="map-world">
                <svg id="trajectory-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
                    <polyline id="trajectory-path" fill="none" stroke="orange" stroke-opacity="0.5" stroke-width="30"/>
                    <g id="robot-group" transform="translate(-200, -200)" style="opacity: 0; pointer-events: none;">
                        <circle id="robot-covariance" cx="0" cy="0" r="3"
                            fill="rgba(46, 204, 113, 0.22)" stroke="rgba(46, 204, 113, 0.45)" stroke-width="1" />
                        <circle id="robot-ripple" cx="0" cy="0" r="15"
                            fill="none" stroke="#3399ff" stroke-width="2" />
                        <circle id="robot-halo" cx="0" cy="0" r="13"
                            fill="rgba(30, 130, 255, 0.45)" stroke="#5ac8ff" stroke-width="1.5" />
                        <polygon id="robot-heading" points="0,-15 -5,-8 5,-8"
                            fill="#f5f5f5" stroke="#222" stroke-width="1" />
                        <circle id="robot-dot" cx="0" cy="0" r="7"
                            fill="#2ecc71" stroke="#222" stroke-width="1.5" />
                    </g>
                </svg>
                <img src="" alt="Carte" id="map-image">
                <img src="./map_costmap.jpg" alt="" id="map-costmap-overlay" aria-hidden="true">
            </div>
            <div id="robot-offline-badge" class="robot-offline-badge">hors-ligne</div>
        </div>
        <div id="controls">
            <h2>Contrôles</h2>
            <div id="coordinates-display">
                <p>Coordonnées GPS du point sélectionné :</p>
                <span id="gps-coords"></span>
            </div>
            
            <div class="trajectories-container">
                <div class="collapsible-section">
                    <div class="section-header" onclick="toggleSection('point-list-section')">
                        <span>▼ Trajet actuel</span>
                    </div>
                    <div id="point-list-section" class="section-content">
                        <ul id="point-list">
                            <!-- Les points du trajet seront ajoutés ici -->
                        </ul>
                    </div>
                </div>
                
                <div class="collapsible-section">
                    <div class="section-header" onclick="toggleSection('saved-trajectories-section')">
                        <span>▼ Trajets sauvegardés</span>
                    </div>
                    <div id="saved-trajectories-section" class="section-content collapsed">
                        <ul id="saved-trajectories-list">
                            <!-- Les trajets sauvegardés seront listés ici -->
                        </ul>
                    </div>
                </div>
            </div>
            
            <div id="action-buttons-container">
                <div id="trajectory-buttons">
                    <div class="button-row">
                        <button id="clear-trajectory" class="btn-red btn-half">Effacer le trajet</button>
                    </div>
                    <button id="remove-last-point">Supprimer le dernier point</button>
                    <div style="margin-top: 10px;">
                        <input type="text" id="trajectory-name" placeholder="Nom de la trajectoire" style="width: 100%; padding: 10px 15px; margin-bottom: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1em;">
                        <button id="save-trajectory" class="btn-yellow" style="width: 100%;">💾 Sauvegarder</button>
                    </div>
                </div>
                
                <div id="edit-buttons" style="display:none;">
                    <button id="clear-forbidden-areas">Effacer les zones interdites</button>
                    <button id="reset-forbidden-areas">Réinitialiser les zones</button>
                </div>
            </div>
            
            <button id="toggle-edit-mode" class="btn-edit">Mode Édition: OFF</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="navig.js"></script>
</body>
</html>
