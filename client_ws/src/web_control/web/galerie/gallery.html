<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie | Robot Control</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        /* Styles spécifiques à la page galerie (inchangés) */
        body { 
            height: auto; 
            overflow-y: auto; 
        }
        .container-gallery {
            max-width: 1200px; margin: 20px auto; padding: 20px;
            background-color: var(--bg-dark); border-radius: 10px; min-height: 80vh;
            transition: background-color 0.3s ease;
        }
        .gallery-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 2px solid var(--accent); padding-bottom: 10px;
            transition: border-color 0.3s ease;
        }
        .gallery-header h1 { 
            color: var(--accent); 
            margin: 0; 
            transition: color 0.3s ease;
        }
        .full-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .gallery-card {
            background: var(--bg-panel); border: 1px solid #444; border-radius: 8px;
            overflow: hidden; position: relative; transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s ease, border-color 0.3s ease;
            cursor: pointer; aspect-ratio: 16/9;
        }
        .gallery-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-color: var(--accent); }
        .gallery-card img, .gallery-card video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .play-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; color: white; text-shadow: 0 0 10px rgba(0,0,0,0.7); pointer-events: none; opacity: 0.8;
        }
        .file-info {
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.7);
            color: white; padding: 8px; font-size: 0.8rem; transform: translateY(100%);
            transition: transform 0.3s; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .gallery-card:hover .file-info { transform: translateY(0); }
        .btn-delete-card { position: absolute; top: 10px; right: 10px; z-index: 10; width: 30px; height: 30px; font-size: 20px; }
        .lightbox {
            display: none; position: fixed; z-index: 2000; padding-top: 50px; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto; background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(5px);
        }
        .lightbox-content { 
            margin: auto; display: block; max-width: 90%; max-height: 80vh; 
            border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            transition: border-color 0.3s ease;
        }
        .lightbox-caption { 
            margin: auto; display: block; width: 80%; max-width: 700px; text-align: center; 
            color: #ccc; padding: 10px 0; font-size: 1.2rem; 
            transition: color 0.3s ease;
        }
        .close-lightbox { 
            position: absolute; top: 15px; right: 35px; color: #f1f1f1; 
            font-size: 40px; font-weight: bold; transition: color 0.3s ease; cursor: pointer; 
        }
        .close-lightbox:hover { color: var(--accent); }
        .empty-gallery { 
            grid-column: 1 / -1; text-align: center; padding: 50px; 
            color: #888; font-size: 1.5rem; border: 2px dashed #444; border-radius: 10px; 
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        /* Responsive gallery */
        @media (max-width: 900px) {
            .full-gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 12px;
            }
            .container-gallery {
                padding: 12px;
                margin: 10px;
            }
            .lightbox-content {
                max-width: 95%;
                max-height: 75vh;
            }
        }
        @media (max-width: 600px) {
            .full-gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px;
            }
            .container-gallery {
                padding: 8px;
                margin: 5px;
            }
            .gallery-header {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
            .gallery-header h1 {
                font-size: 1.3rem;
            }
            .empty-gallery {
                padding: 30px;
                font-size: 1.1rem;
            }
            .action-buttons {
                flex-direction: column;
                gap: 8px;
            }
            .close-lightbox {
                top: 10px;
                right: 15px;
                font-size: 32px;
            }
        }
        
        /* Boutons d'action dans la lightbox */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            align-items: center;
        }
        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            color: white;
            transition: opacity 0.3s, background-color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-download {
            background-color: #2196F3;
        }
        .btn-delete-lightbox {
            background-color: #f44336;
        }
        .btn-action:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<script>
// Désactiver le défilement avec la molette sur body uniquement
document.body.addEventListener('wheel', (e) => {
    if (e.target === document.body || e.target === document.documentElement) {
        e.preventDefault();
    }
}, { passive: false });
</script>

    <header>
        <nav class="header-nav-left">
            <a href="../index.html" class="nav-btn">🕹️ Contrôle</a>
            <a href="../navig/navig.html" class="nav-btn">🗺️ Navigation</a>
        </nav>
        <div class="header-center">
            <a href="../index.html">
                <img src="../logo-polytech.png" alt="Logo Polytech" class="logo">
            </a>
        </div>
        <div class="header-right">
            <button id="btnDarkMode" onclick="toggleDarkMode()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;" title="Mode sombre">🌙</button>
            <div id="status" class="disconnected" title="État de la connexion ROS">Déconnecté</div>
        </div>
    </header>

    <div class="container-gallery">
        <div class="gallery-header">
            <h1>🖼️ Galerie Média</h1>
            <div style="color: var(--text);">
                <span id="fileCount">0</span> fichiers trouvés
            </div>
        </div>
        <div id="fullGalleryGrid" class="full-gallery-grid">
            <div class="empty-gallery">Chargement de la galerie...</div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightboxImg" style="display:none;">
        <video class="lightbox-content" id="lightboxVideo" controls style="display:none;"></video>
        <div id="lightboxCaption" class="lightbox-caption"></div>
        <div class="action-buttons">
            <a id="btnDownload" href="#" download class="btn-action btn-download">
                📥 Télécharger
            </a>
            <button id="btnDeleteLightbox" class="btn-action btn-delete-lightbox">
                🗑️ Supprimer
            </button>
        </div>
    </div>

    <script>
        const robotIp = window.location.hostname;
        const videoHost = robotIp === "" ? "localhost" : robotIp;
        const ros = new ROSLIB.Ros({ url: `ws://${videoHost}:9090` });

        ros.on('connection', () => {
            document.getElementById('status').innerText = 'Connecté';
            document.getElementById('status').className = 'connected';
        });
        ros.on('error', () => {
            document.getElementById('status').innerText = 'Erreur';
            document.getElementById('status').className = 'disconnected';
        });
        ros.on('close', () => {
            document.getElementById('status').innerText = 'Déconnecté';
            document.getElementById('status').className = 'disconnected';
        });

        const gallerySub = new ROSLIB.Topic({ 
            ros: ros, name: '/ui/gallery_files', messageType: 'std_msgs/String' 
        });
        let lastGalleryData = "";
        gallerySub.subscribe((msg) => { 
            try { 
                if (msg.data !== lastGalleryData) {
                    lastGalleryData = msg.data;
                    updateGalleryGrid(JSON.parse(msg.data));
                }
            } catch (e) { console.error(e); } 
        });

        const deletePub = new ROSLIB.Topic({
            ros: ros, name: '/camera/delete_image', messageType: 'std_msgs/String'
        });

        function updateGalleryGrid(files) {
            const grid = document.getElementById('fullGalleryGrid');
            const countLabel = document.getElementById('fileCount');
            countLabel.innerText = files.length;

            if (files.length === 0) {
                grid.innerHTML = '<div class="empty-gallery">Aucune image ou vidéo trouvée.<br><small>Prenez des photos depuis le centre de contrôle.</small></div>';
                return;
            }

            grid.innerHTML = "";

            files.forEach(file => {
                const isVideo = file.toLowerCase().endsWith('.avi') || file.toLowerCase().endsWith('.mp4') || file.toLowerCase().endsWith('.webm');
                
                // --- MODIFICATION IMPORTANTE ICI ---
                // On ajoute "../" car le fichier HTML est dans le sous-dossier 'galerie'
                // mais le lien 'gallery' (symlink) est à la racine du site web.
                const fileUrl = '../gallery/' + file; 
                // -----------------------------------

                const card = document.createElement('div');
                card.className = 'gallery-card';

                let mediaElement;
                if (isVideo) {
                    // Vidéo avec miniature robuste : capture première frame ou fallback
                    mediaElement = document.createElement('video');
                    mediaElement.preload = "metadata";
                    mediaElement.muted = true;
                    mediaElement.playsInline = true;
                    mediaElement.crossOrigin = "anonymous";

                    // Fallback poster généré une seule fois
                    if (!window.__videoFallbackPoster) {
                        const c = document.createElement('canvas');
                        c.width = 320; c.height = 180;
                        const cx = c.getContext('2d');
                        cx.fillStyle = '#0f1419';
                        cx.fillRect(0, 0, c.width, c.height);
                        cx.fillStyle = '#4da3d8';
                        cx.beginPath();
                        cx.moveTo(c.width * 0.4, c.height * 0.3);
                        cx.lineTo(c.width * 0.7, c.height * 0.5);
                        cx.lineTo(c.width * 0.4, c.height * 0.7);
                        cx.closePath();
                        cx.fill();
                        window.__videoFallbackPoster = c.toDataURL('image/png');
                    }
                    mediaElement.setAttribute('poster', window.__videoFallbackPoster);

                    const source = document.createElement('source');
                    source.src = fileUrl;
                    if (file.toLowerCase().endsWith('.mp4')) {
                        source.type = 'video/mp4';
                    } else if (file.toLowerCase().endsWith('.webm')) {
                        source.type = 'video/webm';
                    } else {
                        source.type = 'video/avi';
                    }
                    mediaElement.appendChild(source);

                    const buildPoster = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = mediaElement.videoWidth || 320;
                            canvas.height = mediaElement.videoHeight || 180;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(mediaElement, 0, 0, canvas.width, canvas.height);
                            mediaElement.setAttribute('poster', canvas.toDataURL('image/jpeg'));
                            mediaElement.pause();
                        } catch (err) {
                            console.warn('Miniature vidéo non générée', err);
                            mediaElement.setAttribute('poster', window.__videoFallbackPoster);
                        }
                    };

                    mediaElement.addEventListener('loadedmetadata', () => {
                        // Aller rapidement dans la vidéo pour avoir une frame dispo
                        mediaElement.currentTime = Math.min(0.1, mediaElement.duration || 0.1);
                    }, { once: true });

                    mediaElement.addEventListener('seeked', () => {
                        buildPoster();
                    }, { once: true });

                    mediaElement.addEventListener('error', () => {
                        mediaElement.setAttribute('poster', window.__videoFallbackPoster);
                    }, { once: true });

                    const playOverlay = document.createElement('div');
                    playOverlay.className = 'play-overlay';
                    playOverlay.innerHTML = '▶';
                    card.appendChild(playOverlay);
                } else {
                    mediaElement = document.createElement('img');
                    mediaElement.src = fileUrl;
                    mediaElement.loading = "lazy";
                }
                
                card.onclick = (e) => {
                    if(e.target.classList.contains('btn-delete-card')) return;
                    openLightbox(fileUrl, isVideo, file);
                };

                const info = document.createElement('div');
                info.className = 'file-info';
                info.innerText = file;

                const btnDel = document.createElement('button');
                btnDel.innerHTML = "&times;";
                btnDel.className = "btn-delete btn-delete-card";
                btnDel.title = "Supprimer définitivement";
                btnDel.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm("Supprimer " + file + " ?")) {
                        const msg = new ROSLIB.Message({ data: file });
                        deletePub.publish(msg);
                    }
                };

                card.appendChild(mediaElement);
                card.appendChild(info);
                card.appendChild(btnDel);
                grid.appendChild(card);
            });
        }

        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightboxImg');
        const lbVid = document.getElementById('lightboxVideo');
        const lbCap = document.getElementById('lightboxCaption');
        const btnDownload = document.getElementById('btnDownload');
        const btnDeleteLightbox = document.getElementById('btnDeleteLightbox');
        
        let currentFile = "";
        let currentFileUrl = "";

        function openLightbox(url, isVideo, filename) {
            currentFile = filename;
            currentFileUrl = url;
            
            lightbox.style.display = "block";
            lbCap.innerText = filename;
            
            // Mettre à jour le lien de téléchargement
            btnDownload.href = url;
            btnDownload.download = filename;
            
            if (isVideo) {
                lbImg.style.display = "none";
                lbVid.style.display = "block";

                // Méthode simple (comme index.html) : src direct sans <source>
                lbVid.pause();
                lbVid.src = url;
                lbVid.load();
                lbVid.play().catch(() => {
                    lbCap.innerText = filename + " (format non pris en charge par le navigateur, téléchargez le fichier)";
                });
            } else {
                lbVid.style.display = "none";
                lbVid.pause();
                lbVid.src = "";
                lbImg.style.display = "block";
                lbImg.src = url;
            }
            document.body.style.overflow = "hidden";
        }

        btnDeleteLightbox.onclick = function() {
            if(confirm("Supprimer " + currentFile + " ?")) {
                const msg = new ROSLIB.Message({ data: currentFile });
                deletePub.publish(msg);
                closeLightbox();
            }
        };

        function closeLightbox() {
            lightbox.style.display = "none";
            lbVid.pause();
            lbVid.innerHTML = "";
            lbImg.src = "";
            document.body.style.overflow = "auto";
            currentFile = "";
            currentFileUrl = "";
        }

        lightbox.onclick = function(event) { if (event.target == lightbox) closeLightbox(); }
        document.addEventListener('keydown', function(event) { if (event.key === "Escape") closeLightbox(); });

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode ? 'enabled' : 'disabled');
            const btn = document.getElementById('btnDarkMode');
            if (btn) btn.textContent = isDarkMode ? '☀️' : '🌙';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('btnDarkMode');
                if (btn) btn.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
