map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      downsample_costmap: false
      #downsampling_factor: 2
      tolerance: 0.45 # précision / distance à laquelle coller le checkpoint (génération du trajet)
      use_astar: true # Utilise l'algorithme A* pour la planification, sinon Dijkstra
      allow_unknown: true # Permet de planifier à travers des zones inconnues (non cartographiées)
      cost_travel_multiplier: 4.0 # pénalise fortement les cellules de coût non nul (zones grises)
      expected_planner_frequency: 1.0 # Fréquence à laquelle le planificateur est censé produire des plans (en Hz)
      #use_backwards_motion: false # Permet au planificateur de générer des plans qui incluent des mouvements en marche arrière
      use_multi_thread: true # Permet au planificateur d'utiliser plusieurs threads pour accélérer la planification, en particulier pour les plans complexes ou les grandes cartes
      max_planning_time: 5.0 # Temps maximum (en secondes) que le planificateur doit consacrer à trouver un plan avant d'abandonner et de retourner une erreur
      



controller_server:
  ros__parameters:
    use_sim_time: true
    controller_plugins: ["FollowPath"]
    controller_frequency: 10.0      # ajouter — doit être ≤ update_frequency costmap
    costmap_update_timeout: 0.6
    enable_stamped_cmd_vel: true
    
    # ── Ajouter ces deux blocs ──────────────────────────────────────────
    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 2.5      # cohérent avec tolerance: 0.45 du planner
      yaw_goal_tolerance: 6.28     # orientation libre (robot non-holonome)
      stateful: true               # ← clé : une fois entré dans la zone = validé
    # ────────────────────────────────────────────────────────────────────


    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.7 # Vitesse linéaire souhaitée (m.s⁻1 par seconde)
      desired_angular_vel: 1.5

      lookahead_dist: 0.7 # Distance (en mètres) à laquelle le contrôleur regarde en avant sur le chemin pour déterminer la direction de suivi. Un lookahead plus long peut conduire à un suivi plus fluide mais moins précis, tandis qu'un lookahead plus court peut améliorer la précision au détriment de la fluidité.
      min_lookahead_dist: 0.5 # Distance minimale (en mètres) à laquelle le contrôleur doit regarder en avant sur le chemin
      max_lookahead_dist: 1.2
      lookahead_time: 2.0 # Temps (en secondes) utilisé pour calculer la distance de lookahead en fonction de la vitesse actuelle du robot. La distance de lookahead est souvent calculée comme la vitesse actuelle multipliée par ce temps, ce qui permet au contrôleur de s'adapter dynamiquement à différentes vitesses.
      rotate_to_heading_angular_vel: 1.0 
      use_rotate_to_heading: false
      min_approach_linear_velocity: 0.04 
      max_allowed_time_to_collision_up_to_carrot: 0.5 # Temps maximum (en secondes) avant une collision imminente avec un obstacle détecté sur le chemin vers le point de suivi (carrot). Si un obstacle est détecté dans ce délai, le contrôleur peut réduire la vitesse linéaire ou prendre d'autres mesures pour éviter la collision.
      use_regulated_linear_velocity_scaling: true 
      use_fixed_curvature_lookahead: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.15
      allow_reversing: false # sinon il avance en arrière et le lidar suivera pas.
      max_robot_pose_search_dist: 3.0 # Distance maximale (en mètres) à laquelle le contrôleur cherchera la position actuelle du robot sur le chemin planifié. Si le robot est trop éloigné du chemin, cela peut indiquer une déviation importante ou une perte de localisation, et le contrôleur peut choisir de ne pas tenter de suivre le chemin jusqu'à ce que la localisation soit rétablie.
      

bt_navigator:
  ros__parameters:
    use_sim_time: true
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    default_server_timeout: 60
    action_server_result_timeout : 20.0
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      xy_goal_tolerance: 2.5 # validation par le controleur
      yaw_goal_tolerance: 6.28319  # en rad, pour l'orientation

behavior_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: true
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      width: 300
      height: 150
      resolution: 0.1
      transform_tolerance: 1.0
      initial_transform_timeout: 30.0
      robot_radius: 0.38           # ← à adapter à la taille réelle
      footprint_padding: 0.02      # marge de sécurité supplémentaire
      plugins: ["static_layer","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8
        cost_scaling_factor: 1.0 # gradient plus pentu + pénalité planner: évite les zones grises

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 10 # Définit l'étendue horizontale de la carte locale de navigation
      height: 10 #Définit l'étendue verticale de la carte locale de navigation
      resolution: 0.1
      transform_tolerance: 1.0
      initial_transform_timeout: 30.0
      robot_radius: 0.38           # ← à adapter à la taille réelle
      footprint_padding: 0.02      # marge de sécurité supplémentaire
      plugins: ["static_layer","obstacle_layer","inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8
        cost_scaling_factor: 1.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan          # ← ton topic lidar
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.5
          obstacle_min_range: 0.0