navsat_transform:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 1.5
    use_sim_time: true
    
    gps_topic: /gps/fix
    imu_topic: /imu/data
    odometry_topic: /odometry/local
    
    world_frame: map
    base_link_frame: base_link
    
    wait_for_datum: true
    # Origine fixe = Saint-Cyr-l'École (ENU: yaw=0.0 -> robot face à l'Est)
    # ⚠️  Ces coordonnées DOIVENT correspondre exactement au <spherical_coordinates>
    #     de ton fichier world Gazebo :
    #       <latitude_deg>48.7994</latitude_deg>
    #       <longitude_deg>2.0281</longitude_deg>
    #       <elevation>150</elevation>
    #       <heading_deg>0</heading_deg>  <!-- 0 = axe X Gazebo vers l'Est, aligné ENU -->
    datum: [48.7994, 2.0281, 0.0]

    # En simulation Gazebo : 0.0 (Gazebo donne des coords GPS vraies, sans déclinaison)
    # En réel à St-Cyr   : 0.0489 rad (~2.8°)
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0  # Correct si heading_deg=0 dans Gazebo (axe X = Est = ENU)
    zero_altitude: true
    broadcast_utm_transform: false
    # false = navsat utilise /imu/data directement pour aligner le GPS
    # => indépendant du yaw de l'EKF local, plus robuste à la dérive
    use_odometry_yaw: false
    
    publish_filtered_gps: true
